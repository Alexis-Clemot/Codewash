# ─────────────────────────────────────────────────────────────────────────────
# CI — Level Up RPG
#
# Se déclenche sur chaque push et chaque pull request vers main.
# Le pipeline échoue (et bloque le push/merge) si :
#   - le build Vite produit une erreur
#   - un des 125 tests de caractérisation échoue
#
# Tout tourne dans le Dockerfile défini dans project/project/Dockerfile.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image and run checks
        # On build l'image Docker — si le build ou les tests échouent,
        # le RUN dans le Dockerfile retourne un code non-zéro et cette
        # étape échoue, ce qui fait échouer toute la CI.
        run: |
          docker build \
            --tag levelup-rpg-ci \
            ./project/project