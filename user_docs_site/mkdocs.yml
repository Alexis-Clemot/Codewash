site_name: CodeWash — Guide Utilisateur
site_description: Tout ce qu'il faut savoir pour jouer à CodeWash
site_author: Code Wash Inc.
docs_dir: docs
site_dir: _site

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tooltips

plugins:
  - search:
      lang: fr

nav:
  - Accueil: index.md
  - Démarrer:
      - Installation: getting-started/installation.md
      - Premier lancement: getting-started/first-launch.md
      - Interface principale: getting-started/main-menu.md
  - Jouer:
      - Les mini-jeux: gameplay/minigames.md
      - Niveaux et progression: gameplay/levels.md
      - Succès et collectables: gameplay/collectables.md
  - Fonctionnalités:
      - Changer la langue: features/language.md
      - Changer le thème: features/themes.md
      - Signaler un bug: features/bug-report.md
  - Problèmes fréquents: troubleshooting/faq.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/votre-repo/codewash

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables